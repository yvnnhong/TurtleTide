name: dbt CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  dbt-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dbt
        run: pip install dbt-core dbt-bigquery

      - name: Set up GCP credentials
        run: echo '${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}' > turtletide-key.json

      - name: Set up dbt profiles
        run: |
          mkdir -p ~/.dbt
          cat <<EOF > ~/.dbt/profiles.yml
          turtletide:
            target: dev
            outputs:
              dev:
                type: bigquery
                method: service-account
                project: manifest-stream-452700-g7
                dataset: turtletide_gold
                keyfile: turtletide-key.json
                location: US
                threads: 4
                job_execution_timeout_seconds: 300
          EOF

      - name: Run dbt tests
        run: |
          cd turtletide
          dbt test